name: CI + Deploy to Fly.io

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-fly
  cancel-in-progress: true

env:
  REGISTRY_IMAGE: ghcr.io/${{ github.repository }}/webtodesk
  IMAGE_TAG: ${{ github.sha }}
  DOCKERFILE: deploy/Dockerfile.monolith
  FLY_CONFIG: deploy/fly.toml

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build backend
        run: |
          mvn -B -DskipTests package

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push monolith image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          push: true
          tags: |
            ${{ env.REGISTRY_IMAGE }}:${{ env.IMAGE_TAG }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install flyctl
        run: |
          curl -L https://fly.io/install.sh | sh
          echo "$HOME/.fly/bin" >> $GITHUB_PATH

      - name: Deploy image to Fly.io
        env:
          FLY_APP_NAME: ${{ secrets.FLY_APP_NAME }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          USER_SERVICE_DB_PASSWORD: ${{ secrets.USER_SERVICE_DB_PASSWORD }}
          USER_SERVICE_REDIS_URL: ${{ secrets.USER_SERVICE_REDIS_URL }}
        run: |
          if [ -z "$FLY_APP_NAME" ]; then
            echo "Missing secret: FLY_APP_NAME"
            exit 1
          fi

          flyctl auth token "${{ secrets.FLY_API_TOKEN }}"

          # Set runtime secrets (NOT stored in the repo, and not hardcoded in workflow).
          flyctl secrets set --app "$FLY_APP_NAME" \
            JWT_ACCESS_SECRET="$JWT_ACCESS_SECRET" \
            JWT_REFRESH_SECRET="$JWT_REFRESH_SECRET" \
            MONGODB_URI="$MONGODB_URI" \
            USER_SERVICE_DB_PASSWORD="$USER_SERVICE_DB_PASSWORD" \
            USER_SERVICE_REDIS_URL="$USER_SERVICE_REDIS_URL"

          IMAGE="${{ env.REGISTRY_IMAGE }}:${{ env.IMAGE_TAG }}"
          flyctl deploy \
            --app "$FLY_APP_NAME" \
            --config "$FLY_CONFIG" \
            --image "$IMAGE"

