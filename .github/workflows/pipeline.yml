name: CI/CD Pipeline

on:
  pull_request:
  push:
    branches:
      - development
  workflow_dispatch:

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Application
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache frontend build
        uses: actions/cache@v4
        with:
          path: |
            frontend/node_modules/.vite
            frontend/.tsbuildinfo
          key: ${{ runner.os }}-frontend-${{ hashFiles('frontend/package-lock.json') }}

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Verify backend
        run: mvn -B verify

  deploy:
    name: Deploy to Hugging Face Space
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # Removed fetch-depth: 0 to save time!

      - name: Push repository to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "Missing HF_TOKEN"
            exit 1
          fi
          if [ -z "$HF_USERNAME" ]; then
            echo "Missing HF_USERNAME"
            exit 1
          fi
          if [ -z "$HF_SPACE_NAME" ]; then
            echo "Missing HF_SPACE_NAME"
            exit 1
          fi
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Obliterate the old git history to remove the ghost .jar files
          rm -rf .git
          
          # 2. Start a fresh git repository
          git init
          git branch -M main
          
          # 3. Add only the current files (the jars are gone now!)
          git add .
          git commit -m "Deploy latest version to Hugging Face"
          
          # 4. Force push this single, clean commit to HF
          git remote add hf "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME}"
          git push --force hf main:main