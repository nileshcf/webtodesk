name: CI/CD Pipeline

on:
  pull_request:
  push:
    branches:
      - development
      - module-refining
  workflow_dispatch:

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Frontend ──────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Type-check & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Cache frontend build
        uses: actions/cache@v4
        with:
          path: |
            frontend/node_modules/.vite
            frontend/.tsbuildinfo
          key: ${{ runner.os }}-frontend-${{ hashFiles('frontend/package-lock.json') }}

  # ── conversion-service ───────────────────────────────────────────────
  conversion-service:
    name: conversion-service — Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run tests
        run: >
          mvn -B -pl conversion-service test
          -DMONGODB_URI=mongodb://localhost:27017/test_webtodesk
          -DR2_ENABLED=false
          -DR2_ACCOUNT_ID=test
          -DR2_ACCESS_KEY_ID=test
          -DR2_SECRET_ACCESS_KEY=test

  # ── other backend modules (compile-only, no DB needed) ───────────────
  backend-compile:
    name: Backend — Compile all modules
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compile (skip tests)
        run: mvn -B compile -DskipTests

  # ── Deploy (only on push to development) ────────────────────────────
  deploy:
    name: Deploy to Hugging Face Spaces
    runs-on: ubuntu-latest
    needs: [frontend, conversion-service, backend-compile]
    if: github.event_name == 'push' && github.ref == 'refs/heads/development'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # Removed fetch-depth: 0 to save time!

      - name: Stop Running Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub
          python -c "from huggingface_hub import HfApi; api = HfApi(token='${HF_TOKEN}'); api.pause_space('${{ secrets.HF_USERNAME }}/${{ secrets.HF_SPACE_NAME }}')" || true

      - name: Push repository to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "Missing HF_TOKEN"
            exit 1
          fi
          if [ -z "$HF_USERNAME" ]; then
            echo "Missing HF_USERNAME"
            exit 1
          fi
          if [ -z "$HF_SPACE_NAME" ]; then
            echo "Missing HF_SPACE_NAME"
            exit 1
          fi
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Obliterate the old git history to remove the ghost .jar files
          rm -rf .git
          
          # 2. Start a fresh git repository
          git init
          git branch -M main
          
          # 3. Add only the current files (the jars are gone now!)
          git add .
          git commit -m "Deploy latest version to Hugging Face"
          
          # 4. Force push this single, clean commit to HF
          git remote add hf "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME}"
          git push --force hf main:main