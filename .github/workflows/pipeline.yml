name: CI/CD Pipeline

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Application
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache frontend build tool state
        uses: actions/cache@v4
        with:
          path: |
            frontend/node_modules/.vite
            frontend/.tsbuildinfo
          key: ${{ runner.os }}-frontend-build-${{ hashFiles('frontend/package-lock.json', 'frontend/tsconfig*.json', 'frontend/vite.config.*') }}
          restore-keys: |
            ${{ runner.os }}-frontend-build-

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Verify and package backend
        run: mvn -B verify

  docker:
    name: Verify Monolith Image
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build monolith image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.monolith
          push: false
          tags: webtodesk:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy To Render
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "Missing RENDER_DEPLOY_HOOK_URL secret"
            exit 1
          fi

          curl --fail --silent --show-error --request POST "$RENDER_DEPLOY_HOOK_URL"
