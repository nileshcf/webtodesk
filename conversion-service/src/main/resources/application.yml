server:
  port: 8082

spring:
  application:
    name: conversion-service
  data:
    mongodb:
      # Provided at runtime (GitHub Actions/Fly secrets)
      uri: ${MONGODB_URI}

webtodesk:
  build:
    output-dir: ${BUILD_OUTPUT_DIR:${java.io.tmpdir}/webtodesk-builds}
    target-platform: ${WEBTODESK_BUILD_TARGET_PLATFORM:auto}
    repo-url: ${REPO_URL:https://github.com/nileshcf/webtodesk.git}
  r2:
    enabled: ${R2_ENABLED:true}
    account-id: ${R2_ACCOUNT_ID}
    access-key-id: ${R2_ACCESS_KEY_ID}
    secret-access-key: ${R2_SECRET_ACCESS_KEY}
    bucket: ${R2_BUCKET:webtodesk-builds}
    public-url: ${R2_PUBLIC_URL:https://pub-1b61d73b19424844a83d743c392ddea5.r2.dev}
    endpoint: https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/