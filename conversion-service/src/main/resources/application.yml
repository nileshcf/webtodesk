server:
  port: 8082
  tomcat:
    connection-timeout: 5s

spring:
  application:
    name: conversion-service
  data:
    mongodb:
      # Provided at runtime (GitHub Actions/Fly secrets)
      uri: ${MONGODB_URI}
  mvc:
    async:
      request-timeout: -1

webtodesk:
  build:
    output-dir: ${BUILD_OUTPUT_DIR:${java.io.tmpdir}/webtodesk-builds}
    target-platform: ${WEBTODESK_BUILD_TARGET_PLATFORM:auto}
    development-build: ${DEVELOPMENT_BUILD:false}
    linux-target: ${WEBTODESK_LINUX_TARGET:AppImage}
    keep-workspace-on-failure: ${KEEP_WORKSPACE_ON_FAILURE:false}
    electron-builder:
      debug: ${ELECTRON_BUILDER_DEBUG:false}
    retry:
      max-attempts: ${BUILD_RETRY_MAX_ATTEMPTS:3}
      backoff-ms: ${BUILD_RETRY_BACKOFF_MS:3000}
      jitter-ms: ${BUILD_RETRY_JITTER_MS:750}
    repo-url: ${REPO_URL:https://github.com/nileshcf/webtodesk.git}
  r2:
    enabled: ${R2_ENABLED:true}
    account-id: ${R2_ACCOUNT_ID}
    access-key-id: ${R2_ACCESS_KEY_ID}
    secret-access-key: ${R2_SECRET_ACCESS_KEY}
    bucket: ${R2_BUCKET:webtodesk-builds}
    public-url: ${R2_PUBLIC_URL:https://pub-1b61d73b19424844a83d743c392ddea5.r2.dev}
    endpoint: https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
  show-actuator: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
      base-path: /actuator
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        builds.duration: true
      percentiles:
        builds.duration: 0.5,0.75,0.95,0.99

logging:
  level:
    root: WARN
    com.example.conversion_service: INFO
    org.springframework.web: WARN
    org.springframework.data.mongodb.core: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] [pid:%X{projectId:-system}] %-5level %logger{30} - %msg%n"