services:
  - type: web
    name: webtodesk
    runtime: docker
    dockerfilePath: ./deploy/Dockerfile.monolith
    dockerContext: .
    autoDeploy: false
    healthCheckPath: /
    envVars:
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: USER_SERVICE_DB_PASSWORD
        sync: false
      - key: USER_SERVICE_REDIS_URL
        sync: false
      - key: MONGODB_URI
        sync: false
